name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: test (${{ matrix.backend }})
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        backend: [mysql, postgres]

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
          MYSQL_DATABASE: sidekick_server_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot --silent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -h 127.0.0.1 -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Run coverage gate
        if: matrix.backend == 'mysql'
        env:
          DURABABBLE_DATABASE_URL: mysql://root@127.0.0.1:3306/sidekick_server_test
          DURABABBLE_MYSQL_HOST: 127.0.0.1
          DURABABBLE_TEST_BACKENDS: mysql
        run: bundle exec rake test:coverage

      - name: Run PostgreSQL suite
        if: matrix.backend == 'postgres'
        env:
          DURABABBLE_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
          DURABABBLE_POSTGRES_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
          DURABABBLE_TEST_BACKENDS: postgres
        run: bundle exec rake test

      - name: Upload coverage report
        if: always() && matrix.backend == 'mysql'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore
          include-hidden-files: true

  dst:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # The fuzz sweep (every scenario × N seeds) dominates wall time. Shard the
    # seed space across parallel jobs via DST_FUZZ_SEEDS so each shard covers
    # every scenario over a slice of seeds; together they exercise the full
    # 1..350 range.
    #
    # Shards are sized so a shard runs about as long as — but always a little
    # less than — the slowest sibling job (test (mysql), ~190-205s), maximizing
    # fuzz coverage without DST becoming the critical path. Per-shard wall time
    # is ~22s fixed + ~1.8s/seed, so 70 seeds/shard lands at ~150s; even a worst
    # case contention spike stays under the ~190s mysql floor. Bump the seed
    # count per shard (and re-split the range) if test (mysql) gets slower or
    # the DST shards start finishing well under it again.
    strategy:
      fail-fast: false
      matrix:
        seeds: ["1..70", "71..140", "141..210", "211..280", "281..350"]

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      # The Deterministic Simulation Testing suite runs uninstrumented and
      # against the in-memory SQLite store only, so it needs no database
      # service and no SimpleCov. Kept out of the coverage gate because its
      # seed sweeps add ~no incremental coverage but dominate wall time.
      - name: Run deterministic simulation suite
        env:
          DST_FUZZ_SEEDS: ${{ matrix.seeds }}
        run: bundle exec rake dst

  lint-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Run RuboCop, RBS validation, typecheck, and Markdown format check
        run: bundle exec rake lint

  docs-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
          MYSQL_DATABASE: sidekick_server_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot --silent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Install Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.152.2"
          extended: true

      - name: Generate query reports and build docs site
        env:
          DURABABBLE_DATABASE_URL: mysql://root@127.0.0.1:3306/sidekick_server_test
          DURABABBLE_MYSQL_HOST: 127.0.0.1
        run: bundle exec rake docs:build
