name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
          MYSQL_DATABASE: sidekick_server_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot --silent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Run coverage gate
        env:
          DURABABBLE_MYSQL_HOST: 127.0.0.1
        run: bundle exec rake test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore
          include-hidden-files: true

  dst:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # The fuzz sweep (every scenario × 100 seeds) dominates wall time and was
    # pushing a single job past the 20-minute cap. Shard the seed space across
    # parallel jobs via DST_FUZZ_SEEDS so each shard covers every scenario over a
    # slice of seeds; together they exercise the full 1..100 range. Split into
    # five shards (20 seeds each) as the scenario count grows, keeping each
    # shard comfortably under the cap.
    strategy:
      fail-fast: false
      matrix:
        seeds: ["1..20", "21..40", "41..60", "61..80", "81..100"]

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      # The Deterministic Simulation Testing suite runs uninstrumented and
      # against the in-memory SQLite store only, so it needs no database
      # service and no SimpleCov. Kept out of the coverage gate because its
      # seed sweeps add ~no incremental coverage but dominate wall time.
      - name: Run deterministic simulation suite
        env:
          DST_FUZZ_SEEDS: ${{ matrix.seeds }}
        run: bundle exec rake dst

  lint-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Run RuboCop, RBS validation, typecheck, and Markdown format check
        run: bundle exec rake lint

  formal:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Verify Alloy models
        run: scripts/verify-alloy.sh

      - name: Validate formal sigils
        run: bundle exec ruby scripts/validate-durababble-sigils.rb

  docs-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.152.2"
          extended: true

      - name: Build docs site
        run: hugo --minify --destination docs/build
